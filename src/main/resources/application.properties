spring.application.name=Procedures-CafeLab

# Carga .env desde la raíz del proyecto (IntelliJ, mvn, etc.)
#spring.config.import=optional:file:.env[.properties]

# PostgreSQL / Supabase (pooler transaccional, puerto 6543)
# Usa variables de entorno (o un fichero .env con spring-dotenv) para no commitear credenciales.
# JDBC debe usar esquema jdbc:postgresql:... El prefijo DATABASE_URL tipo libpq no es válido aquí sin adaptarlo.
#
# Ejemplo pooler Supabase:
# spring.datasource.url=jdbc:postgresql://aws-0-REGION.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
# spring.datasource.username=postgres.tu_ref_de_proyecto
# prepareThreshold=0 evita prepared statements problemáticas con PgBouncer en modo transacción.
#
# Para migraciones con Flyway o herramientas que necesitan sesión completa, usa el pooler en 5432 (modo sesión)
# u otra URL directa según documentación Supabase de tu proyecto.
spring.datasource.url=${SUPABASE_JDBC_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool (recomendado con PgBouncer en modo transacción)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.naming.physical-strategy=com.upc.pe.managementcafelab.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation

# Elements take their values from maven pom.xml build-related information
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration Properties
authorization.jwt.secret = WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days = 7

# Flyway Configuration
spring.flyway.enabled=false

server.port=${PORT:8080}